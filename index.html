<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trémont</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <main class="hero">
      <div id="background-one" class="hero-bg active"></div>
      <div id="background-two" class="hero-bg"></div>
      <div class="overlay"></div>

      <header class="header">
        <a href="#" class="logo-link" aria-label="Trémont home">
          <img
            id="logo"
            src="https://i.ibb.co/RB6Fb3S/tr-mont.png"
            alt="Trémont logo"
          />
        </a>

        <nav class="navbar" id="navbar" aria-label="Main navigation">
          <ul class="nav-links">
            <li><a href="#order">Order Now</a></li>
            <li><a href="#home">Home</a></li>
            <li><a href="#gallery">Gallery</a></li>
            <li><a href="#story">Story</a></li>
            <li><a href="#visit">Visit</a></li>
          </ul>
        </nav>
      </header>

      <section id="home" class="hero-content">
        <p class="location">123 Fake Street — Seattle, WA — 206-555-7890</p>

        <h1>Trémont</h1>
        <p class="tagline">Modern dining, crafted with warmth.</p>

        <div class="hero-actions">
          <a href="#eat" id="eat" class="hero-link">Eat</a>
          <a href="#drink" id="drink" class="hero-link">Drink</a>
          <a href="#visit" id="visit" class="hero-link">Visit</a>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
